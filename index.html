<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#171615">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>日報作成ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);--action-h:116px;--bg:#171615;--bg-soft:#1d1b19;--card:#24211f;--card-2:#2b2825;--input:#302c28;--input-strong:#38332e;--text:#f3eee7;--text-soft:#d7cec4;--text-muted:#9a9086;--text-dim:#756d65;--border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.14);--accent:#d88a3d;--accent-strong:#f0a24a;--accent-soft:rgba(216,138,61,.16);--danger:#ff6b5f;--success:#54c878;--shadow:rgba(0,0,0,.28)}
html{background:var(--bg);min-height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background-color:var(--bg);background-image:radial-gradient(circle at 20% -10%,rgba(216,138,61,.1),transparent 28%),linear-gradient(180deg,var(--bg-soft),var(--bg));color:var(--text);font-size:16px;padding-bottom:calc(var(--action-h) + var(--safe-bottom))}

.screen{display:none}
.screen.active{display:block}

h1{font-size:22px;font-weight:700;padding:calc(18px + var(--safe-top)) 12px 10px;color:var(--text);letter-spacing:.01em}
.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 8px}
.mini-btn{min-height:34px;border:1px solid var(--border-strong);border-radius:8px;background:var(--card);color:var(--accent-strong);font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 5px 12px rgba(0,0,0,.2)}
.mini-btn:active{filter:brightness(1.08)}
.top-pane{min-height:calc(100svh - var(--action-h) - var(--safe-bottom));display:flex;flex-direction:column;overflow:hidden}
.top-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 8px;align-content:start}
.top-card{background:linear-gradient(180deg,var(--card),#211e1c);border:1px solid var(--border);border-radius:16px;box-shadow:0 10px 24px var(--shadow);overflow:hidden}
.top-card.wide{grid-column:1/-1}

.sec-title{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.04em;padding:8px 10px 4px;text-transform:uppercase}
.sec-title .count{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:0;text-transform:none}
.sec-title.has-step{display:flex;align-items:center;justify-content:space-between;gap:6px}
.step-size-row{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:0;text-transform:none;white-space:nowrap}
.step-size-select{width:44px;min-height:22px;border:1px solid var(--border-strong);border-radius:7px;background:var(--input);color:var(--accent-strong);font-size:12px;font-weight:800;text-align:center;text-align-last:center;padding:1px 4px;outline:none}

.field{padding:6px 10px;border-bottom:.5px solid var(--border);display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;column-gap:8px;min-height:30px}
.field:last-child{border-bottom:none}
.field label{font-size:13px;color:var(--text-soft);min-width:0;white-space:normal;overflow:visible;text-overflow:clip;line-height:1.25;word-break:normal;overflow-wrap:anywhere}
.field input[type=number],.field input[type=text],.field select{text-align:right;border:1px solid var(--border-strong);outline:none;font-size:14px;color:var(--text);background:var(--input);width:118px;max-width:55%;padding:4px 8px;min-height:28px;flex:0 0 auto;border-radius:8px;justify-self:end;font-variant-numeric:tabular-nums;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.field select{text-align-last:right}
.field.field-date{grid-template-columns:minmax(0,1fr) auto}
.field.field-date #reportDate{width:146px;max-width:68vw;text-align:center;font-size:13px;padding:4px 6px}
.field input[readonly]{background:var(--card-2);color:var(--text-muted)}
.field input::placeholder,.prop-name::placeholder{color:var(--text-dim)}
.field input[type=number]:focus,.field input[type=text]:focus,.field select:focus,.prop-name:focus,.num-field input:focus{border-color:var(--accent-strong);box-shadow:0 0 0 2px var(--accent-soft),inset 0 1px 0 rgba(255,255,255,.04)}
.field-value{font-size:14px;color:var(--text-soft);min-width:66px;text-align:right;flex:0 0 auto;justify-self:end;font-variant-numeric:tabular-nums}

.top-card.sales .field{grid-template-columns:minmax(0,1fr) 98px}
.top-card.sales .field input[type=number],.top-card.sales .field input.ios-num{width:98px;max-width:98px}
.top-card.sales .field label,.top-card.register .field label,.top-card.visitor .field label{font-size:12px}
.top-card.register{align-self:start}
.top-card.register .sec-title{padding-bottom:6px}
.top-card.register .field{grid-template-columns:minmax(0,1fr) 46px;min-height:36px;padding-top:7px;padding-bottom:7px}
.top-card.register .field input[type=number],.top-card.register .field input.ios-num,.top-card.register .field select.target-select,.top-card.register .field .field-value{width:46px;max-width:46px;min-width:46px;height:28px;min-height:28px;box-sizing:border-box;justify-self:end;text-align:right;font-size:14px;font-variant-numeric:tabular-nums}
.top-card.register .field input[type=number],.top-card.register .field input.ios-num{padding:0 6px;line-height:26px}
.top-card.register .field select.target-select{padding:0 6px;line-height:26px;border:1px solid var(--border-strong);border-radius:8px;background:var(--input);color:var(--accent-strong);text-align-last:right;-webkit-appearance:none;appearance:none;background-image:none}
.top-card.register .field .field-value{display:inline-flex;align-items:center;justify-content:flex-end;padding:0 6px;border:1px solid var(--border-strong);border-radius:8px;background:var(--input);color:var(--text-soft);line-height:26px}
.top-card.vacancy .field{grid-template-columns:minmax(0,1fr) 46px}
.top-card.vacancy .field input[type=number],.top-card.vacancy .field input.ios-num,.top-card.visitor .field input[type=number],.top-card.visitor .field input.ios-num{width:46px;max-width:46px}

.field.compact-field{grid-template-columns:minmax(0,1fr) auto;column-gap:6px;min-height:34px;padding-top:5px;padding-bottom:5px}
.compact-stepper{display:grid;grid-template-columns:28px 44px 28px;gap:4px;align-items:center;justify-self:end;width:108px}
.compact-stepper input[type=number],.compact-stepper input.ios-num{width:44px!important;max-width:44px!important;min-width:44px!important;height:28px;min-height:28px;text-align:center;padding:0 4px;line-height:26px}
.compact-stepper input[readonly]{background:var(--input);color:var(--text);opacity:1;cursor:default}
.compact-stepper-btn,.stepper-btn{background:var(--input-strong);border:1px solid var(--border-strong);color:var(--accent-strong);box-shadow:0 4px 10px rgba(0,0,0,.22)}
.compact-stepper-btn{width:28px;height:28px;border-radius:8px;font-size:18px;font-weight:900;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
.compact-stepper-btn.minus{color:var(--text-muted)}
.compact-stepper-btn.plus{background:linear-gradient(180deg,rgba(216,138,61,.22),rgba(216,138,61,.12));border-color:rgba(216,138,61,.34);color:var(--accent-strong)}

.section{background:linear-gradient(180deg,var(--card),#211e1c);border:1px solid var(--border);border-radius:16px;margin:0 12px 10px;overflow:hidden;box-shadow:0 10px 24px var(--shadow)}
.prop-block{padding:10px 12px;border-bottom:.5px solid var(--border);max-height:420px;overflow:hidden;transform-origin:top center;transition:max-height .34s cubic-bezier(.22,.61,.36,1),padding .28s ease,margin .28s ease,opacity .24s ease,transform .24s ease,border-color .2s ease}
.prop-block:last-child{border-bottom:none}
.prop-block.is-removing{opacity:0;transform:translateY(-6px);padding-top:0;padding-bottom:0;margin-top:0;margin-bottom:0;border-bottom-color:transparent;pointer-events:none}
.prop-name{width:100%;border:1px solid var(--border-strong);outline:none;font-size:14px;font-weight:500;color:var(--text-soft);background:var(--input);margin-bottom:8px;border-radius:8px;padding:7px 9px;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid var(--border-strong);background:var(--input);color:var(--text-muted);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;user-select:none;transition:transform .06s ease,filter .06s ease,box-shadow .08s ease;box-shadow:0 4px 10px rgba(0,0,0,.18)}
.tag:active{transform:translateY(2px) scale(.93);filter:brightness(.85) saturate(1.08);box-shadow:inset 0 2px 6px rgba(0,0,0,.25),0 1px 1px rgba(0,0,0,.15)}
.tag.on{background:linear-gradient(180deg,var(--accent-strong),var(--accent));border-color:rgba(240,162,74,.65);color:#24160b;box-shadow:0 5px 14px rgba(216,138,61,.28)}
.nums-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.num-field{background:var(--card-2);border-radius:8px;padding:8px 10px}
.num-field label{font-size:11px;color:var(--text-muted);display:block;margin-bottom:3px}
.num-field input{width:100%;border:1px solid var(--border-strong);outline:none;font-size:14px;color:var(--text);background:var(--input);border-radius:8px;padding:5px 8px;min-height:28px;text-align:right;font-variant-numeric:tabular-nums;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}
.stepper{display:grid;grid-template-columns:30px minmax(34px,1fr) 30px;gap:5px;align-items:center}
.stepper-btn{height:30px;border-radius:8px;font-size:20px;font-weight:800;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer}
.stepper input{width:100%;min-width:0;text-align:center;padding:0 4px;pointer-events:none;background:var(--input);color:var(--text);font-size:16px;font-weight:700;border-color:var(--border-strong)}
.del-row{display:flex;justify-content:flex-end;margin-bottom:4px}
.del-btn{font-size:13px;color:var(--danger);background:none;border:none;padding:0;cursor:pointer}

.action-bar{position:fixed;left:0;right:0;bottom:0;padding:10px 12px calc(10px + var(--safe-bottom));background:linear-gradient(to top,rgba(23,22,21,.98),rgba(23,22,21,.9) 72%,rgba(23,22,21,0));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.add-btn,.gen-btn,.copy-btn{width:100%;border-radius:12px;cursor:pointer;display:block}
.add-btn{padding:12px;font-size:15px;min-height:46px;border:1.5px dashed var(--accent);background:var(--card);color:var(--accent-strong);box-shadow:0 8px 18px rgba(0,0,0,.24)}
.gen-btn{margin-top:8px;padding:13px;font-size:16px;min-height:48px;font-weight:700;background:linear-gradient(180deg,var(--accent-strong),var(--accent));color:#24160b;border:none;box-shadow:0 10px 20px rgba(216,138,61,.22)}
.gen-btn:disabled{opacity:.9}
.add-btn,.gen-btn,.copy-btn{box-shadow:0 6px 14px rgba(0,0,0,.18)}
button{transition:transform .06s ease,filter .06s ease,box-shadow .08s ease;box-shadow:0 4px 10px rgba(0,0,0,.14)}
button,.tag,.compact-stepper-btn,.stepper-btn{touch-action:manipulation;-webkit-user-select:none;user-select:none}
button:active{transform:translateY(3px) scale(.94);filter:brightness(.86) saturate(1.08);box-shadow:inset 0 2px 8px rgba(0,0,0,.35),0 1px 2px rgba(0,0,0,.2)}
button:focus-visible{outline:2px solid var(--accent-strong);outline-offset:2px}
.spin-arrow{display:inline-block;font-size:18px;line-height:1;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.report-head{display:flex;align-items:center;gap:8px;padding:10px 12px 4px}
.back-btn{display:inline-flex;align-items:center;gap:6px;border:none;background:none;color:var(--accent-strong);font-size:17px;font-weight:600;cursor:pointer;padding:4px 0}
.back-btn .arrow{font-size:20px;line-height:1}
.report-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:.01em}
.out-wrap{margin:8px 12px 20px}
.out-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 14px;white-space:pre-wrap;font-size:14px;line-height:1.45;color:var(--text);word-break:normal;overflow-wrap:anywhere;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',monospace;box-shadow:0 10px 24px var(--shadow)}
.copy-btn{margin-top:10px;padding:13px;font-size:16px;min-height:48px;font-weight:600;background:linear-gradient(180deg,var(--card),#211e1c);color:var(--accent-strong);border:1px solid var(--border-strong);box-shadow:0 10px 24px var(--shadow)}
.copy-btn.ok{background:var(--success);border-color:var(--success);color:#0e2115}
.settings-actions{padding:10px 12px 20px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.settings-actions button{min-height:44px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 7px 16px rgba(0,0,0,.24)}
.save-settings-btn{border:none;background:linear-gradient(180deg,var(--accent-strong),var(--accent));color:#24160b}
.settings-back-btn{border:1px solid var(--border-strong);background:var(--card);color:var(--accent-strong)}
.settings-back-btn:active{filter:brightness(1.08)}
.toast{position:fixed;left:50%;bottom:calc(18px + var(--safe-bottom));transform:translateX(-50%) translateY(12px);max-width:calc(100% - 32px);padding:9px 14px;border-radius:999px;background:rgba(20,18,17,.96);color:var(--text);border:1px solid rgba(216,138,61,.25);font-size:13px;font-weight:700;z-index:10000;opacity:0;pointer-events:none;transition:opacity .18s ease,transform .18s ease;white-space:nowrap;box-shadow:0 10px 28px rgba(0,0,0,.35)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.loading-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(23,22,21,.54);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);z-index:9999;opacity:1;transition:opacity .15s ease}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-panel{background:rgba(36,33,31,.96);border:1px solid var(--border-strong);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:10px;color:var(--text);font-size:16px;font-weight:700;box-shadow:0 14px 34px rgba(0,0,0,.36)}
.loading-panel .spin-arrow{font-size:20px}

.ios .field input.ios-num,.ios .num-field input.ios-num{text-align:right !important}
.ios .field input[type=number],.ios .field input[type=text],.ios .field select,.ios .prop-name,.ios .num-field input{font-size:16px !important}
.ios .field.field-date #reportDate{font-size:13px !important}
.ios .step-size-select{font-size:16px!important;width:48px}
.ios .compact-stepper input.ios-num[readonly]{text-align:center !important}

@media(max-width:430px){
  .field.compact-field{grid-template-columns:1fr!important;row-gap:6px;align-items:start;min-height:auto;padding-top:7px;padding-bottom:8px}
  .field.compact-field label{width:100%;white-space:normal;overflow:visible;text-overflow:clip;line-height:1.3}
  .field.compact-field .compact-stepper{justify-self:end}
}

@media(max-width:360px){
  .field{padding:5px 8px;grid-template-columns:minmax(0,1fr) auto}
  .field label{font-size:12px}
  .field input[type=number],.field input[type=text]{font-size:13px;width:92px}
}
</style>
</head>
<body>
<div id="editorScreen" class="screen active">
  <div class="top-pane">
    <h1>日報作成</h1>
    <div class="quick-actions">
      <button type="button" class="mini-btn" id="openSettingsBtn">設定</button>
      <button type="button" class="mini-btn" id="restoreSnapshotBtn">前回値を使用</button>
    </div>
    <div class="top-grid">
      <div class="top-card wide">
        <div class="sec-title">基本情報</div>
        <div class="field">
          <label>担当者名</label>
          <input type="text" id="staff" inputmode="text">
        </div>
        <div class="field field-date">
          <label>作成日</label>
          <input type="text" id="reportDate" readonly>
        </div>
      </div>

      <div class="top-card sales">
        <div class="sec-title">賃貸 — 売上・実績</div>
        <div class="field"><label>売上目標（円）</label><input type="number" id="target" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>当月実績（円）</label><input type="number" id="actual" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>当月見込み（円）</label><input type="number" id="forecast" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>契約件数</label><input type="number" id="contracts" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>内AD件数</label><input type="number" id="ad" placeholder="0" inputmode="numeric"></div>
      </div>

      <div class="top-card visitor">
        <div class="sec-title has-step">来店客数（当日）<span class="step-size-row">増減幅 <select id="visitorStepSize" class="step-size-select" aria-label="来店客数の増減幅"><option value="1">1</option><option value="5">5</option><option value="10">10</option></select></span></div>
        <div class="field"><label>予約</label><input type="number" id="v1" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>飛込</label><input type="number" id="v2" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>再来店</label><input type="number" id="v3" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>その他</label><input type="number" id="v4" placeholder="0" inputmode="numeric"></div>
      </div>

      <div class="top-card register">
        <div class="sec-title has-step">物件登録件数<span class="step-size-row">増減幅 <select id="registerStepSize" class="step-size-select" aria-label="物件登録件数の増減幅"><option value="1">1</option><option value="5">5</option><option value="10">10</option></select></span></div>
        <input type="hidden" id="ah1" value="40">
        <div class="field"><label>at home 実績</label><input type="number" id="ah2" placeholder="0" inputmode="numeric"></div>
        <input type="hidden" id="su1" value="10">
        <div class="field"><label>SUUMO 実績</label><input type="number" id="su2" placeholder="0" inputmode="numeric"></div>
        <input type="hidden" id="hp" value="">
      </div>

      <div class="top-card vacancy">
        <div class="sec-title has-step"><span>賃貸空室<span id="vacancyPropCount" class="count">（追加物件 0件）</span></span><span class="step-size-row">増減幅 <select id="vacancyStepSize" class="step-size-select" aria-label="賃貸空室の増減幅"><option value="1">1</option><option value="5">5</option><option value="10">10</option></select></span></div>
        <div class="field"><label>管理物件</label><input type="number" id="r1" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>一般物件</label><input type="number" id="r2" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>内空き予定</label><input type="number" id="r3" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>内サブリース</label><input type="number" id="r4" placeholder="0" inputmode="numeric"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">空き物件状況</div>
    <div id="propList"></div>
  </div>

  <div class="action-bar">
    <button type="button" class="add-btn" id="addPropBtn">＋ 物件を追加</button>
    <button type="button" class="gen-btn" id="generateBtn">日報を生成する</button>
  </div>
</div>

<div id="settingsScreen" class="screen">
  <h1>設定</h1>
  <div class="section">
    <div class="sec-title">固定設定</div>
    <div class="field">
      <label>担当者名</label>
      <input type="text" id="settingsStaff" inputmode="text">
    </div>
    <div class="field">
      <label>at home目標</label>
      <select id="settingsAh1" class="target-select"><option value="10">10</option><option value="20">20</option><option value="30">30</option><option value="40">40</option><option value="50">50</option></select>
    </div>
    <div class="field">
      <label>SUUMO目標</label>
      <select id="settingsSu1" class="target-select"><option value="10">10</option><option value="20">20</option><option value="30">30</option><option value="40">40</option><option value="50">50</option></select>
    </div>
    <div class="field">
      <label>ホームページ目標</label>
      <select id="settingsHp" class="target-select"><option value="" selected></option><option value="10">10</option><option value="20">20</option><option value="30">30</option><option value="40">40</option><option value="50">50</option></select>
    </div>
  </div>
  <div class="settings-actions">
    <button type="button" class="save-settings-btn" id="saveSettingsBtn">設定を保存</button>
    <button type="button" class="settings-back-btn" id="settingsBackBtn">戻る</button>
  </div>
</div>

<div id="reportScreen" class="screen">
  <div class="report-head">
    <button type="button" class="back-btn" id="backBtn"><span class="arrow">←</span>戻る</button>
  </div>
  <div class="out-wrap" id="outWrap">
    <div class="out-box" id="out"></div>
    <button type="button" class="copy-btn" id="copyBtn">コピーする</button>
  </div>
</div>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite" aria-busy="true">
  <div class="loading-panel">
    <span class="spin-arrow" aria-hidden="true">↻</span>
    <span>生成中...</span>
  </div>
</div>

<script>
let pid=0;
let isGenerating=false;
const statusLabels=['通常','賃料査定中','ネット掲載準備中'];
const snapshotStorageKey='daily_report_last_values_v3';
const settingsStorageKey='daily_report_settings_v1';
const metaStorageKey='daily_report_meta_v1';
const fieldDefaults={
  staff:'',
  target:'',
  actual:'',
  forecast:'',
  contracts:'0',
  ad:'0',
  v1:'0',
  v2:'0',
  v3:'0',
  v4:'0',
  ah1:'40',
  ah2:'',
  su1:'10',
  su2:'',
  hp:'',
  r1:'',
  r2:'',
  r3:'',
  r4:''
};
const persistedFieldIds=[
  'staff','target','actual','forecast','contracts','ad',
  'v1','v2','v3','v4',
  'ah1','ah2','su1','su2','hp',
  'r1','r2','r3','r4'
];
const compactStepperGroups={
  visitor:{stepSelectId:'visitorStepSize',fieldIds:['v1','v2','v3','v4']},
  register:{stepSelectId:'registerStepSize',fieldIds:['ah2','su2']},
  vacancy:{stepSelectId:'vacancyStepSize',fieldIds:['r1','r2','r3','r4']}
};
const initProps=[];

function getEl(id){return document.getElementById(id);}
function getVal(id,usePlaceholder){
  const el=getEl(id);
  if(!el)return '';
  if(el.value!=='')return el.value;
  if(usePlaceholder&&typeof el.placeholder==='string'&&el.placeholder!=='')return el.placeholder;
  return '';
}

function normalizeNumericText(value){
  const digits=String(value===undefined||value===null?'':value).replace(/[^0-9]/g,'');
  if(digits==='')return '';
  return digits.replace(/^0+(?=\d)/,'');
}

function isNumericLikeInput(input){
  if(!(input instanceof HTMLInputElement))return false;
  if(input.readOnly)return false;
  if(input.type==='number')return true;
  if(input.classList.contains('ios-num'))return true;
  return input.getAttribute('inputmode')==='numeric';
}

function sanitizeNumericInputField(input){
  if(!isNumericLikeInput(input))return;
  const before=input.value||'';
  const selStart=typeof input.selectionStart==='number'?input.selectionStart:before.length;
  const selEnd=typeof input.selectionEnd==='number'?input.selectionEnd:before.length;
  const leftRaw=before.slice(0,selStart);
  const normalized=normalizeNumericText(before);
  if(normalized===before)return;
  input.value=normalized;
  const leftNormalized=normalizeNumericText(leftRaw);
  const nextPos=Math.min(leftNormalized.length,normalized.length);
  try{
    if(document.activeElement===input){
      input.setSelectionRange(nextPos,nextPos);
      return;
    }
    const atEnd=selStart===before.length&&selEnd===before.length;
    if(atEnd)moveCaretToEnd(input);
  }catch(_e){}
}

function gv(id){
  const normalized=normalizeNumericText(getVal(id,true));
  return normalized===''?'0':normalized;
}
function yen(n){return parseInt(n||0,10).toLocaleString('ja-JP')+'円';}

function applyDeltaToField(inputId,delta){
  const input=getEl(inputId);
  if(!input)return;
  const current=parseInt(normalizeNumericText(input.value),10)||0;
  const next=Math.max(0,current+delta);
  input.value=String(next);
  sanitizeNumericInputField(input);
  triggerIOSHaptic();
}

function bindFastTapButton(button,handler){
  let lastTouchAt=0;
  button.addEventListener('touchstart',e=>{
    if(!isIOSDevice()&&!isStandalonePWA())return;
    e.preventDefault();
    lastTouchAt=Date.now();
    handler();
  },{passive:false});
  button.addEventListener('click',e=>{
    if(Date.now()-lastTouchAt<600){
      e.preventDefault();
      return;
    }
    handler();
  });
}

function getStepSize(groupName){
  const group=compactStepperGroups[groupName];
  const select=group?getEl(group.stepSelectId):null;
  const value=select?select.value:'1';
  return ['1','5','10'].includes(value)?parseInt(value,10):1;
}

function createCompactStepper(input,groupName){
  const wrap=document.createElement('div');
  wrap.className='compact-stepper';

  const minus=document.createElement('button');
  minus.type='button';
  minus.className='compact-stepper-btn minus';
  minus.textContent='−';
  minus.setAttribute('aria-label','減らす');
  bindFastTapButton(minus,()=>applyDeltaToField(input.id,-getStepSize(groupName)));

  const plus=document.createElement('button');
  plus.type='button';
  plus.className='compact-stepper-btn plus';
  plus.textContent='+';
  plus.setAttribute('aria-label','増やす');
  bindFastTapButton(plus,()=>applyDeltaToField(input.id,getStepSize(groupName)));

  wrap.appendChild(minus);
  wrap.appendChild(input);
  wrap.appendChild(plus);
  return wrap;
}

function setupCompactSteppers(){
  Object.keys(compactStepperGroups).forEach(groupName=>{
    compactStepperGroups[groupName].fieldIds.forEach(id=>{
      const input=getEl(id);
      if(!input)return;
      const field=input.closest('.field');
      if(!field||field.querySelector('.compact-stepper'))return;
      field.classList.add('compact-field');
      field.appendChild(createCompactStepper(input,groupName));
    });
  });
}

function setupReadonlyCompactInputs(){
  Object.values(compactStepperGroups).forEach(group=>{
    group.fieldIds.forEach(id=>{
      const input=getEl(id);
      if(input)input.readOnly=true;
    });
  });
}

function formatDateWithDow(d){
  const days=['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
}
function formatFullDateWithDow(d){
  const days=['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
}
function pad2(n){return String(n).padStart(2,'0');}
function getDateKey(date){
  return `${date.getFullYear()}-${pad2(date.getMonth()+1)}-${pad2(date.getDate())}`;
}
function getMonthKey(date){
  return `${date.getFullYear()}-${pad2(date.getMonth()+1)}`;
}
function syncToday(){
  const el=getEl('reportDate');
  if(el)el.value=formatFullDateWithDow(new Date());
}

function setupStandalonePWAViewportLock(){
  if(!isIOSDevice()||!isStandalonePWA())return;
  const viewport=document.querySelector('meta[name="viewport"]');
  if(!viewport)return;
  viewport.setAttribute('content','width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
}

function isEditableControl(el){
  if(el instanceof HTMLInputElement)return !el.readOnly&&!el.disabled;
  if(el instanceof HTMLTextAreaElement)return !el.readOnly&&!el.disabled;
  if(el instanceof HTMLSelectElement)return !el.disabled;
  return false;
}

function forceIOSZoomOut(){
  if(!isIOSDevice())return;
  if(isEditableControl(document.activeElement))return;
  const viewport=document.querySelector('meta[name="viewport"]');
  if(!viewport)return;
  const fallback='width=device-width, initial-scale=1.0, viewport-fit=cover';
  const original=viewport.getAttribute('content')||fallback;
  if(!viewport.dataset.defaultViewport)viewport.dataset.defaultViewport=original;
  viewport.setAttribute('content','width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover');
  setTimeout(()=>{
    viewport.setAttribute('content',viewport.dataset.defaultViewport||fallback);
  },320);
}

let iosZoomOutTimer=0;
function scheduleIOSZoomOutAfterEditing(){
  if(!isIOSDevice())return;
  if(iosZoomOutTimer){
    clearTimeout(iosZoomOutTimer);
    iosZoomOutTimer=0;
  }
  iosZoomOutTimer=setTimeout(()=>{
    forceIOSZoomOut();
    setTimeout(forceIOSZoomOut,220);
  },90);
}

function isIOSDevice(){
  const ua=navigator.userAgent||'';
  const iOS=/iPad|iPhone|iPod/.test(ua);
  const iPadOS=navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1;
  return iOS||iPadOS;
}

function isStandalonePWA(){
  const byMedia=window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches;
  const byIOSFlag=window.navigator&&window.navigator.standalone===true;
  return !!(byMedia||byIOSFlag);
}

let lastHapticAt=0;
function triggerIOSHaptic(){
  const canVibrate=typeof navigator.vibrate==='function';
  if(!isIOSDevice()&&!isStandalonePWA()&&!canVibrate)return;
  const now=Date.now();
  if(now-lastHapticAt<80)return;
  lastHapticAt=now;

  try{
    if(window.Telegram&&window.Telegram.WebApp&&window.Telegram.WebApp.HapticFeedback){
      window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
      return;
    }
  }catch(_e){}

  try{
    const handlers=window.webkit&&window.webkit.messageHandlers;
    if(handlers&&handlers.hapticFeedback){
      handlers.hapticFeedback.postMessage({style:'light'});
      return;
    }
    if(handlers&&handlers.haptic){
      handlers.haptic.postMessage('light');
      return;
    }
  }catch(_e){}

  try{
    if(canVibrate)navigator.vibrate([8]);
  }catch(_e){}
}

function setupIOSButtonHaptics(){
  const canVibrate=typeof navigator.vibrate==='function';
  if(!isIOSDevice()&&!isStandalonePWA()&&!canVibrate)return;
  document.addEventListener('touchstart',e=>{
    const target=e.target;
    if(!(target instanceof Element))return;
    const control=target.closest('button,.tag');
    if(!control)return;
    if(control instanceof HTMLButtonElement&&control.disabled)return;
    triggerIOSHaptic();
  },{passive:true});
  document.addEventListener('keydown',e=>{
    const target=e.target;
    if(!(target instanceof Element))return;
    if(e.key!=='Enter'&&e.key!==' ')return;
    const control=target.closest('button,.tag');
    if(!control)return;
    if(control instanceof HTMLButtonElement&&control.disabled)return;
    triggerIOSHaptic();
  });
}

function moveCaretToEnd(el){
  if(!el)return;
  try{
    const len=el.value.length;
    el.setSelectionRange(len,len);
  }catch(_e){}
}

function selectAllInputValue(el){
  if(!(el instanceof HTMLInputElement||el instanceof HTMLTextAreaElement))return;
  if(el.readOnly||el.disabled)return;
  if((el.value||'').length===0)return;
  try{
    if(typeof el.select==='function'){
      el.select();
      return;
    }
    const len=el.value.length;
    el.setSelectionRange(0,len);
  }catch(_e){}
}

function keepIOSCaretAtEndIfNeeded(input){
  if(!isIOSDevice())return;
  if(!(input instanceof HTMLInputElement))return;
  if(!input.classList.contains('ios-num'))return;
  if(document.activeElement!==input)return;
  try{
    const pos=typeof input.selectionStart==='number'?input.selectionStart:0;
    const end=typeof input.selectionEnd==='number'?input.selectionEnd:0;
    if(input.value.length>0&&pos===0&&end===0){
      setTimeout(()=>selectAllInputValue(input),0);
    }
  }catch(_e){}
}

function normalizeIOSNumericInputs(root){
  if(!isIOSDevice())return;
  const scope=root||document;
  scope.querySelectorAll('input[type=\"number\"]').forEach(input=>{
    input.setAttribute('type','text');
    input.setAttribute('inputmode','numeric');
    input.setAttribute('pattern','[0-9]*');
    input.classList.add('ios-num');
  });
}

function setupIOSNumericCaretFix(){
  if(!isIOSDevice())return;
  document.body.classList.add('ios');
  normalizeIOSNumericInputs(document);
  document.addEventListener('focusin',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement))return;
    if(!target.classList.contains('ios-num'))return;
    setTimeout(()=>selectAllInputValue(target),0);
  });
  document.addEventListener('input',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement))return;
    keepIOSCaretAtEndIfNeeded(target);
  });
  document.addEventListener('touchend',e=>{
    const target=e.target;
    if(!(target instanceof Element))return;
    const input=target.closest('input.ios-num');
    if(!(input instanceof HTMLInputElement))return;
    keepIOSCaretAtEndIfNeeded(input);
  },{passive:true});
  document.addEventListener('focusout',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement||target instanceof HTMLTextAreaElement))return;
    if(target.readOnly)return;
    if(target instanceof HTMLInputElement)sanitizeNumericInputField(target);
    scheduleIOSZoomOutAfterEditing();
  });
}

function setupFocusSelectForEditableInputs(){
  document.addEventListener('focusin',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement||target instanceof HTMLTextAreaElement))return;
    if(target.readOnly||target.disabled)return;
    if(target.classList.contains('ios-num'))return;
    setTimeout(()=>selectAllInputValue(target),0);
  });
}

function setupNumericInputSanitizer(){
  document.addEventListener('input',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement))return;
    sanitizeNumericInputField(target);
  });
  document.addEventListener('blur',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement))return;
    sanitizeNumericInputField(target);
  },true);
}

function addProp(name='',status='通常',h=0,s=0,focusAfterAdd=false){
  const id=pid++;
  const safeH=normalizeNumericText(h);
  const safeS=normalizeNumericText(s);
  const initialH=safeH===''?'0':safeH;
  const initialS=safeS===''?'0':safeS;
  const activeStatus=statusLabels.includes(status)?status:'通常';
  const div=document.createElement('div');
  div.className='prop-block';
  div.id='pb'+id;

  const delRow=document.createElement('div');
  delRow.className='del-row';
  const delBtn=document.createElement('button');
  delBtn.type='button';
  delBtn.className='del-btn';
  delBtn.textContent='削除';
  delBtn.addEventListener('click',()=>removeProp(id));
  delRow.appendChild(delBtn);

  const nameInput=document.createElement('input');
  nameInput.className='prop-name';
  nameInput.id='pn'+id;
  nameInput.type='text';
  nameInput.placeholder='物件名・部屋番号';
  nameInput.value=name||'';
  nameInput.inputMode='text';

  const tagsWrap=document.createElement('div');
  tagsWrap.className='tags';
  tagsWrap.id='sr'+id;
  statusLabels.forEach(label=>{
    const tag=document.createElement('span');
    tag.className='tag'+(label===activeStatus?' on':'');
    tag.textContent=label;
    tag.addEventListener('click',()=>toggleTag(tag,id));
    tagsWrap.appendChild(tag);
  });

  const numsRow=document.createElement('div');
  numsRow.className='nums-row';
  numsRow.appendChild(createStepperField('🈳 反響','ph'+id,initialH));
  numsRow.appendChild(createStepperField('🈸 申し込み','ps'+id,initialS));

  div.appendChild(delRow);
  div.appendChild(nameInput);
  div.appendChild(tagsWrap);
  div.appendChild(numsRow);
  getEl('propList').appendChild(div);
  normalizeIOSNumericInputs(div);
  updatePropCount();
  if(focusAfterAdd){
    div.scrollIntoView({behavior:'smooth',block:'center'});
    setTimeout(()=>{
      if(!nameInput)return;
      nameInput.focus();
      nameInput.select();
    },220);
  }
}

function updatePropCount(){
  const countEl=getEl('vacancyPropCount');
  const list=getEl('propList');
  if(!countEl||!list)return;
  const count=list.querySelectorAll('.prop-block').length;
  countEl.textContent=`（追加物件 ${count}件）`;
}

function createStepperField(labelText,inputId,value){
  const field=document.createElement('div');
  field.className='num-field';

  const label=document.createElement('label');
  label.textContent=labelText;

  const stepper=document.createElement('div');
  stepper.className='stepper';

  const minus=document.createElement('button');
  minus.type='button';
  minus.className='stepper-btn';
  minus.textContent='-';
  bindFastTapButton(minus,()=>stepPropCount(inputId,-1));

  const input=document.createElement('input');
  input.type='text';
  input.id=inputId;
  input.value=value;
  input.readOnly=true;

  const plus=document.createElement('button');
  plus.type='button';
  plus.className='stepper-btn';
  plus.textContent='+';
  bindFastTapButton(plus,()=>stepPropCount(inputId,1));

  stepper.appendChild(minus);
  stepper.appendChild(input);
  stepper.appendChild(plus);
  field.appendChild(label);
  field.appendChild(stepper);
  return field;
}

function addPropAndFocus(){
  addProp('', '通常', 0, 0, true);
}

function stepPropCount(id,delta){
  const input=getEl(id);
  if(!input)return;
  const current=parseInt(gv(id),10)||0;
  const next=Math.max(0,current+delta);
  input.value=String(next);
  triggerIOSHaptic();
}

function removeProp(id){
  const target=getEl('pb'+id);
  if(!target||target.classList.contains('is-removing'))return;
  target.style.maxHeight=target.scrollHeight+'px';
  target.getBoundingClientRect();
  target.classList.add('is-removing');
  target.style.maxHeight='0px';

  let done=false;
  const finalize=()=>{
    if(done)return;
    done=true;
    target.remove();
    updatePropCount();
  };
  target.addEventListener('transitionend',e=>{
    if(e.propertyName==='max-height')finalize();
  },{once:true});
  setTimeout(finalize,450);
}

function toggleTag(el,id){
  const wrap=getEl('sr'+id);
  if(!wrap)return;
  wrap.querySelectorAll('.tag').forEach(tag=>tag.classList.remove('on'));
  el.classList.add('on');
}

function getStatus(id){
  const wrap=getEl('sr'+id);
  const on=wrap?wrap.querySelector('.tag.on'):null;
  return on?on.textContent:'通常';
}

function isValidTargetValue(value){
  return ['10','20','30','40','50'].includes(String(value));
}

function loadLastSnapshot(){
  try{
    const raw=localStorage.getItem(snapshotStorageKey);
    if(!raw)return null;
    const data=JSON.parse(raw);
    if(!data||typeof data!=='object')return null;
    return data;
  }catch(_e){
    return null;
  }
}

function loadSettings(){
  try{
    const raw=localStorage.getItem(settingsStorageKey);
    if(!raw)return null;
    const data=JSON.parse(raw);
    return data&&typeof data==='object'?data:null;
  }catch(_e){
    return null;
  }
}

function loadMeta(){
  try{
    const raw=localStorage.getItem(metaStorageKey);
    if(!raw)return null;
    const data=JSON.parse(raw);
    return data&&typeof data==='object'?data:null;
  }catch(_e){
    return null;
  }
}

function saveMeta(meta){
  try{
    localStorage.setItem(metaStorageKey,JSON.stringify(meta));
  }catch(_e){}
}

function applyInitialFieldValues(snapshot){
  persistedFieldIds.forEach(id=>{
    const el=getEl(id);
    if(!el)return;
    const hasSaved=snapshot&&snapshot.fields&&snapshot.fields[id]!==undefined&&snapshot.fields[id]!==null;
    const saved=hasSaved?String(snapshot.fields[id]):'';
    const hasDefault=fieldDefaults[id]!==undefined&&fieldDefaults[id]!==null;
    let initial=saved!==''?saved:(hasDefault?String(fieldDefaults[id]):'');
    if(id!=='staff'){
      const normalized=normalizeNumericText(initial);
      initial=normalized===''?'0':normalized;
    }
    if((id==='ah1'||id==='su1'||id==='hp')&&!isValidTargetValue(initial)){
      initial=fieldDefaults[id];
    }
    el.value=initial;
  });
}

function applySettingsValues(settings){
  if(!settings)return;
  const staff=getEl('staff');
  const ah1=getEl('ah1');
  const su1=getEl('su1');
  const hp=getEl('hp');
  if(staff&&typeof settings.staff==='string')staff.value=settings.staff;
  if(ah1&&isValidTargetValue(settings.ah1))ah1.value=String(settings.ah1);
  if(su1&&isValidTargetValue(settings.su1))su1.value=String(settings.su1);
  if(hp&&isValidTargetValue(settings.hp))hp.value=String(settings.hp);
}

function applyPropsSnapshot(props){
  const list=getEl('propList');
  if(!list)return;
  list.replaceChildren();
  if(!Array.isArray(props)){
    updatePropCount();
    return;
  }
  props.forEach(p=>{
    const name=typeof p.name==='string'?p.name:'';
    const status=statusLabels.includes(p.status)?p.status:'通常';
    const hRaw=String(p&&p.h!==undefined&&p.h!==null?p.h:'0');
    const sRaw=String(p&&p.s!==undefined&&p.s!==null?p.s:'0');
    const h=normalizeNumericText(hRaw);
    const s=normalizeNumericText(sRaw);
    addProp(name,status,h===''?'0':h,s===''?'0':s);
  });
  updatePropCount();
}

function applySnapshotToScreen(snapshot){
  applyInitialFieldValues(snapshot);
  applyPropsSnapshot(snapshot&&Array.isArray(snapshot.props)?snapshot.props:[]);
}

function getPropsSnapshot(){
  const props=[];
  getEl('propList').querySelectorAll('.prop-block').forEach(block=>{
    const i=block.id.replace('pb','');
    props.push({
      name:getVal('pn'+i,false),
      status:getStatus(i),
      h:gv('ph'+i),
      s:gv('ps'+i)
    });
  });
  return props;
}

function saveLastSnapshot(){
  try{
    const fields={};
    persistedFieldIds.forEach(id=>{
      if(id==='staff'){
        fields[id]=getVal(id,false)||fieldDefaults.staff;
        return;
      }
      fields[id]=gv(id);
    });
    const data={fields,props:getPropsSnapshot()};
    localStorage.setItem(snapshotStorageKey,JSON.stringify(data));
  }catch(_e){}
}

function updateMetaForToday(){
  const now=new Date();
  saveMeta({
    lastUsedDate:getDateKey(now),
    lastUsedMonth:getMonthKey(now)
  });
}

function resetDailyVisitorFields(){
  ['v1','v2','v3','v4'].forEach(id=>{
    const el=getEl(id);
    if(el)el.value='0';
  });
}

function resetMonthlySalesFields(){
  ['target','actual','forecast','contracts','ad'].forEach(id=>{
    const el=getEl(id);
    if(el)el.value='0';
  });
}

function runStartupDateMonthChecks(){
  const now=new Date();
  const todayKey=getDateKey(now);
  const monthKey=getMonthKey(now);
  const meta=loadMeta()||{};
  let changed=false;

  if(meta.lastUsedDate&&meta.lastUsedDate!==todayKey){
    resetDailyVisitorFields();
    showToast('日付が変わったため来店客数をリセットしました');
    changed=true;
  }

  if(meta.lastUsedMonth&&meta.lastUsedMonth!==monthKey){
    const shouldReset=confirm('月が変わりました。売上目標・当月実績・当月見込み・契約件数・内AD件数をリセットしますか？');
    if(shouldReset){
      resetMonthlySalesFields();
      showToast('月初項目をリセットしました');
      changed=true;
    }
  }

  saveMeta({
    lastUsedDate:todayKey,
    lastUsedMonth:monthKey
  });

  if(changed)saveLastSnapshot();
}

function showReport(){
  getEl('editorScreen').classList.remove('active');
  getEl('settingsScreen').classList.remove('active');
  getEl('reportScreen').classList.add('active');
  window.scrollTo(0,0);
}

function goBackToEditor(){
  getEl('reportScreen').classList.remove('active');
  getEl('settingsScreen').classList.remove('active');
  getEl('editorScreen').classList.add('active');
  window.scrollTo(0,0);
}

function showSettingsScreen(){
  syncSettingsFormFromEditor();
  getEl('editorScreen').classList.remove('active');
  getEl('reportScreen').classList.remove('active');
  getEl('settingsScreen').classList.add('active');
  window.scrollTo(0,0);
}

let toastTimer=0;
function showToast(message){
  const toast=getEl('toast');
  if(!toast)return;
  toast.textContent=message;
  toast.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{
    toast.classList.remove('show');
  },2000);
}

function setGenerateLoading(isLoading){
  const btn=getEl('generateBtn');
  const overlay=getEl('loadingOverlay');
  if(!btn||!overlay)return;
  if(isLoading){
    btn.disabled=true;
    overlay.classList.remove('hidden');
    return;
  }
  btn.disabled=false;
  overlay.classList.add('hidden');
}

function handleGenerate(){
  if(isGenerating)return;
  isGenerating=true;
  setGenerateLoading(true);
  setTimeout(()=>{
    try{
      generate();
    }finally{
      setGenerateLoading(false);
      isGenerating=false;
    }
  },550);
}

function generate(){
  const d=new Date();
  const m=d.getMonth()+1;
  const reiwa=d.getFullYear()-2018;
  const dateLabel=formatDateWithDow(d);
  syncToday();
  const staff=getVal('staff',false)||'　';
  const lines=[];
  lines.push(`${dateLabel}   担当　${staff}`);
  lines.push('1️⃣賃貸　');
  lines.push(`令和${reiwa}年${m}月目標`);
  lines.push(`売上目標 ${yen(gv('target'))}`);
  lines.push(`当月実績 ${yen(gv('actual'))}`);
  lines.push(`当月見込み ${yen(gv('forecast'))}`);
  lines.push(`契約件数　　　　${gv('contracts')}件`);
  lines.push(`(内AD                  ${gv('ad')}件)`);
  lines.push('');
  lines.push('◉来店客数');
  lines.push('当日');
  lines.push(`予約　　　${gv('v1')}件`);
  lines.push(`飛込　　　${gv('v2')}件`);
  lines.push(`再来店　　${gv('v3')}件`);
  lines.push(`その他　　${gv('v4')}件`);
  lines.push('');
  lines.push('◉物件登録件数');
  lines.push(`at home ${gv('ah1')}件     ${gv('ah2')}件`);
  lines.push(`SUUMO  ${gv('su1')}件     ${gv('su2')}件`);
  lines.push(`ホームページ        ${gv('hp')}件`);
  lines.push('');
  lines.push('◉賃貸空室');
  lines.push(`管理物件　　　　${gv('r1')}件`);
  lines.push(`一般物件　　　　${gv('r2')}件`);
  lines.push(`内空き予定　　　${gv('r3')}件`);
  lines.push(`内サブリース　　${gv('r4')}件`);
  lines.push('');
  lines.push('【空き物件状況】');
  lines.push('　反響月累計');

  let idx=1;
  getEl('propList').querySelectorAll('.prop-block').forEach(block=>{
    const i=block.id.replace('pb','');
    const name=getVal('pn'+i,false).trim();
    if(!name)return;
    const st=getStatus(i);
    const suffix=st!=='通常'?`（${st}）`:'';
    lines.push(`${idx}.${name}${suffix}`);
    lines.push(`　🈳反響 ${gv('ph'+i)}    🈸${gv('ps'+i)}`);
    idx++;
  });

  getEl('out').textContent=lines.join('\n');
  const btn=getEl('copyBtn');
  btn.textContent='コピーする';
  btn.className='copy-btn';
  saveLastSnapshot();
  updateMetaForToday();
  showReport();
}

function copyOut(){
  const text=getEl('out').textContent;
  const btn=getEl('copyBtn');
  if(!text)return;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showOk(btn)).catch(()=>fallbackCopy(text,btn));
  }else{
    fallbackCopy(text,btn);
  }
}

function fallbackCopy(text,btn){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;left:-9999px;top:0;font-size:16px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try{document.execCommand('copy');showOk(btn);}catch(_e){}
  document.body.removeChild(ta);
}

function showOk(btn){
  btn.textContent='コピーしました！';
  btn.className='copy-btn ok';
  setTimeout(()=>{
    btn.textContent='コピーする';
    btn.className='copy-btn';
  },2500);
}

function syncSettingsFormFromEditor(){
  const settings=loadSettings()||{};
  const staff=getEl('settingsStaff');
  const ah1=getEl('settingsAh1');
  const su1=getEl('settingsSu1');
  const hp=getEl('settingsHp');
  if(staff)staff.value=getVal('staff',false)||settings.staff||'';
  if(ah1){
    const value=getVal('ah1',false)||settings.ah1||fieldDefaults.ah1;
    ah1.value=isValidTargetValue(value)?String(value):fieldDefaults.ah1;
  }
  if(su1){
    const value=getVal('su1',false)||settings.su1||fieldDefaults.su1;
    su1.value=isValidTargetValue(value)?String(value):fieldDefaults.su1;
  }
  if(hp){
    const value=getVal('hp',false)||settings.hp||fieldDefaults.hp;
    hp.value=isValidTargetValue(value)?String(value):fieldDefaults.hp;
  }
}

function saveSettings(){
  const staff=getVal('settingsStaff',false);
  const ah1Value=getVal('settingsAh1',false);
  const su1Value=getVal('settingsSu1',false);
  const hpValue=getVal('settingsHp',false);
  const settings={
    staff,
    ah1:isValidTargetValue(ah1Value)?ah1Value:fieldDefaults.ah1,
    su1:isValidTargetValue(su1Value)?su1Value:fieldDefaults.su1,
    hp:isValidTargetValue(hpValue)?hpValue:fieldDefaults.hp
  };
  try{
    localStorage.setItem(settingsStorageKey,JSON.stringify(settings));
  }catch(_e){}
  applySettingsValues(settings);
  updateSnapshotSettingsFields(settings);
  showToast('設定を保存しました');
}

function updateSnapshotSettingsFields(settings){
  const snapshot=loadLastSnapshot();
  if(!snapshot)return;
  if(!snapshot.fields||typeof snapshot.fields!=='object')snapshot.fields={};
  snapshot.fields.staff=settings.staff;
  snapshot.fields.ah1=settings.ah1;
  snapshot.fields.su1=settings.su1;
  snapshot.fields.hp=settings.hp;
  if(!Array.isArray(snapshot.props))snapshot.props=[];
  try{
    localStorage.setItem(snapshotStorageKey,JSON.stringify(snapshot));
  }catch(_e){}
}

function restorePreviousSnapshot(){
  const snapshot=loadLastSnapshot();
  if(!snapshot){
    showToast('前回値がありません');
    return;
  }
  applySnapshotToScreen(snapshot);
  syncToday();
  showToast('前回値を復元しました');
}

function setupStaticButtonHandlers(){
  const addBtn=getEl('addPropBtn');
  const generateBtn=getEl('generateBtn');
  const backBtn=getEl('backBtn');
  const copyBtn=getEl('copyBtn');
  const openSettingsBtn=getEl('openSettingsBtn');
  const restoreSnapshotBtn=getEl('restoreSnapshotBtn');
  const saveSettingsBtn=getEl('saveSettingsBtn');
  const settingsBackBtn=getEl('settingsBackBtn');
  if(addBtn)addBtn.addEventListener('click',addPropAndFocus);
  if(generateBtn)generateBtn.addEventListener('click',handleGenerate);
  if(backBtn)backBtn.addEventListener('click',goBackToEditor);
  if(copyBtn)copyBtn.addEventListener('click',copyOut);
  if(openSettingsBtn)openSettingsBtn.addEventListener('click',showSettingsScreen);
  if(restoreSnapshotBtn)restoreSnapshotBtn.addEventListener('click',restorePreviousSnapshot);
  if(saveSettingsBtn)saveSettingsBtn.addEventListener('click',saveSettings);
  if(settingsBackBtn)settingsBackBtn.addEventListener('click',goBackToEditor);
}

const lastSnapshot=loadLastSnapshot();
const savedSettings=loadSettings();
if(lastSnapshot){
  applySnapshotToScreen(lastSnapshot);
}else{
  applyInitialFieldValues(null);
  if(savedSettings)applySettingsValues(savedSettings);
  initProps.forEach(p=>addProp(p[0],p[1],p[2],p[3]));
}
setupStandalonePWAViewportLock();
setupReadonlyCompactInputs();
setupIOSNumericCaretFix();
setupFocusSelectForEditableInputs();
setupNumericInputSanitizer();
setupCompactSteppers();
setupIOSButtonHaptics();
setupStaticButtonHandlers();
runStartupDateMonthChecks();
syncToday();
updatePropCount();
</script>
