<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>日報作成ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--safe-bottom:env(safe-area-inset-bottom);--action-h:116px}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f2f2f7;color:#1c1c1e;font-size:16px;padding-bottom:calc(var(--action-h) + var(--safe-bottom))}

.screen{display:none}
.screen.active{display:block}

h1{font-size:22px;font-weight:700;padding:18px 12px 10px;color:#1c1c1e}
.top-pane{min-height:calc(100svh - var(--action-h) - var(--safe-bottom));display:flex;flex-direction:column;overflow:hidden}
.top-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 8px;align-content:start}
.top-card{background:#fff;border-radius:12px;overflow:hidden}
.top-card.wide{grid-column:1/-1}
.sec-title{font-size:11px;font-weight:700;color:#6c6c70;letter-spacing:.04em;padding:8px 10px 4px;text-transform:uppercase}
.field{padding:6px 10px;border-bottom:.5px solid #e5e5ea;display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;column-gap:8px;min-height:30px}
.field:last-child{border-bottom:none}
.field label{font-size:13px;color:#1c1c1e;min-width:0;white-space:normal;overflow:visible;text-overflow:clip;line-height:1.25;word-break:normal;overflow-wrap:anywhere}
.field input[type=number],.field input[type=text]{text-align:right;border:1px solid #d8dde8;outline:none;font-size:14px;color:#1c1c1e;background:#f7f8fb;width:118px;max-width:55%;padding:4px 8px;min-height:28px;flex:0 0 auto;border-radius:8px;justify-self:end;font-variant-numeric:tabular-nums}
.field #reportDate{width:160px;max-width:72%}
.field input[readonly]{background:#eceff5;color:#616671}
.field input::placeholder{color:#c7c7cc}
.ios .field input.ios-num,.ios .num-field input.ios-num{text-align:right !important}
.field-value{font-size:14px;color:#6c6c70;min-width:66px;text-align:right;flex:0 0 auto;justify-self:end;font-variant-numeric:tabular-nums}
.top-card.sales .field{grid-template-columns:minmax(0,1fr) 98px}
.top-card.sales .field input[type=number],.top-card.sales .field input.ios-num{width:98px;max-width:98px}
.top-card.register .field{grid-template-columns:minmax(0,1fr) 46px}
.top-card.register .field input[type=number],.top-card.register .field input.ios-num,.top-card.register .field select.target-select,.top-card.register .field .field-value{width:46px;max-width:46px;min-width:46px;height:28px;min-height:28px;box-sizing:border-box;justify-self:end;text-align:right;font-size:14px;font-variant-numeric:tabular-nums}
.top-card.register .field input[type=number],.top-card.register .field input.ios-num{padding:0 6px;line-height:26px}
.top-card.register .field select.target-select{padding:0 6px;line-height:26px;border:1px solid #d8dde8;border-radius:8px;background:#f7f8fb;color:#1c1c1e;text-align-last:right;-webkit-appearance:none;appearance:none;background-image:none}
.top-card.register .field .field-value{display:inline-flex;align-items:center;justify-content:flex-end;padding:0 6px;border:1px solid #d8dde8;border-radius:8px;background:#f7f8fb;color:#616671;line-height:26px}
.top-card.vacancy .field{grid-template-columns:minmax(0,1fr) 46px}
.top-card.vacancy .field input[type=number],.top-card.vacancy .field input.ios-num{width:46px;max-width:46px}
.top-card.visitor .field input[type=number],.top-card.visitor .field input.ios-num{width:46px;max-width:46px}
.top-card.visitor .field label{font-size:12px}
.top-card.sales .field label,.top-card.register .field label{font-size:12px}

.section{background:#fff;border-radius:12px;margin:0 12px 10px;overflow:hidden}
.prop-block{padding:10px 12px;border-bottom:.5px solid #e5e5ea;max-height:420px;overflow:hidden;transform-origin:top center;transition:max-height .34s cubic-bezier(.22,.61,.36,1),padding .28s ease,margin .28s ease,opacity .24s ease,transform .24s ease,border-color .2s ease}
.prop-block:last-child{border-bottom:none}
.prop-block.is-removing{opacity:0;transform:translateY(-6px);padding-top:0;padding-bottom:0;margin-top:0;margin-bottom:0;border-bottom-color:transparent;pointer-events:none}
.prop-name{width:100%;border:1px solid #d8dde8;outline:none;font-size:14px;font-weight:500;color:#1c1c1e;background:#f7f8fb;margin-bottom:8px;border-radius:8px;padding:7px 9px}
.prop-name::placeholder{color:#c7c7cc}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.tag{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid #c7c7cc;background:#f2f2f7;color:#6c6c70;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;user-select:none;transition:transform .06s ease,filter .06s ease,box-shadow .08s ease;box-shadow:0 3px 7px rgba(0,0,0,.14)}
.tag:active{transform:translateY(2px) scale(.93);filter:brightness(.85) saturate(1.08);box-shadow:inset 0 2px 6px rgba(0,0,0,.25),0 1px 1px rgba(0,0,0,.15)}
.tag.on{background:#007aff;color:#fff;border-color:#007aff;box-shadow:0 3px 9px rgba(0,122,255,.35)}
.nums-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.num-field{background:#f2f2f7;border-radius:8px;padding:8px 10px}
.num-field label{font-size:11px;color:#6c6c70;display:block;margin-bottom:3px}
.num-field input{width:100%;border:1px solid #d8dde8;outline:none;font-size:14px;color:#1c1c1e;background:#fff;border-radius:8px;padding:5px 8px;min-height:28px;text-align:right;font-variant-numeric:tabular-nums}
.del-row{display:flex;justify-content:flex-end;margin-bottom:4px}
.del-btn{font-size:13px;color:#ff3b30;background:none;border:none;padding:0;cursor:pointer}

.action-bar{position:fixed;left:0;right:0;bottom:0;padding:10px 12px calc(10px + var(--safe-bottom));background:linear-gradient(to top,rgba(242,242,247,.98),rgba(242,242,247,.9) 72%,rgba(242,242,247,0));backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.add-btn,.gen-btn,.copy-btn{width:100%;border-radius:12px;cursor:pointer;display:block}
.add-btn{padding:12px;font-size:15px;min-height:46px;border:1.5px dashed #007aff;background:#fff;color:#007aff}
.gen-btn{margin-top:8px;padding:13px;font-size:16px;min-height:48px;font-weight:700;background:#007aff;color:#fff;border:none}
.gen-btn:disabled{opacity:.92}
.add-btn,.gen-btn,.copy-btn{box-shadow:0 6px 14px rgba(0,0,0,.18)}
button{transition:transform .06s ease,filter .06s ease,box-shadow .08s ease;box-shadow:0 4px 10px rgba(0,0,0,.14)}
button:active{transform:translateY(3px) scale(.94);filter:brightness(.86) saturate(1.08);box-shadow:inset 0 2px 8px rgba(0,0,0,.35),0 1px 2px rgba(0,0,0,.2)}
button:focus-visible{outline:2px solid #74aefc;outline-offset:2px}
.spin-arrow{display:inline-block;font-size:18px;line-height:1;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.report-head{display:flex;align-items:center;gap:8px;padding:10px 12px 4px}
.back-btn{display:inline-flex;align-items:center;gap:6px;border:none;background:none;color:#007aff;font-size:17px;font-weight:600;cursor:pointer;padding:4px 0}
.back-btn .arrow{font-size:20px;line-height:1}
.report-title{font-size:18px;font-weight:700;color:#1c1c1e}
.out-wrap{margin:8px 12px 20px}
.out-box{background:#fff;border-radius:12px;padding:14px 14px;white-space:pre-wrap;font-size:14px;line-height:1.45;color:#1c1c1e;word-break:normal;overflow-wrap:anywhere;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',monospace}
.copy-btn{margin-top:10px;padding:13px;font-size:16px;min-height:48px;font-weight:600;background:#fff;color:#007aff;border:1px solid #007aff}
.copy-btn.ok{background:#34c759;border-color:#34c759;color:#fff}

.loading-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(242,242,247,.42);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);z-index:9999;opacity:1;transition:opacity .15s ease}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-panel{background:rgba(255,255,255,.92);border:1px solid rgba(0,0,0,.06);border-radius:14px;padding:16px 22px;display:flex;align-items:center;gap:10px;color:#1c1c1e;font-size:16px;font-weight:700}
.loading-panel .spin-arrow{font-size:20px}
.field input[type=number]:focus,.field input[type=text]:focus,.field select:focus,.prop-name:focus,.num-field input:focus{border-color:#4e8df7;box-shadow:0 0 0 2px rgba(78,141,247,.18)}

@media(max-width:360px){
  .field{padding:5px 8px;grid-template-columns:minmax(0,1fr) auto}
  .field label{font-size:12px}
  .field input[type=number],.field input[type=text]{font-size:13px;width:92px}
}
@media(prefers-color-scheme:dark){
  body{background:#000;color:#fff}
  h1,.report-title{color:#fff}
  .top-card,.section,.out-box,.copy-btn{background:#1c1c1e}
  .sec-title,.num-field label{color:#8e8e93}
  .field{border-bottom-color:#38383a}
  .field label,.prop-name{color:#fff}
  .field input[type=number],.field input[type=text],.prop-name,.num-field input{color:#fff}
  .field input[type=number],.field input[type=text]{background:#2a2d34;border-color:#4a4f5b}
  .field input[readonly]{background:#26292f;color:#bcc2cf}
  .prop-name{background:#2a2d34;border-color:#4a4f5b}
  .top-card.register .field .field-value{background:#2a2d34;border-color:#4a4f5b;color:#bcc2cf}
  .num-field input{background:#1f2228;border-color:#4a4f5b}
  .top-card.register .field select.target-select{background:#2a2d34;border-color:#4a4f5b;color:#fff}
  .field input[type=number]:focus,.field input[type=text]:focus,.field select:focus,.prop-name:focus,.num-field input:focus{border-color:#7ab2ff;box-shadow:0 0 0 2px rgba(122,178,255,.2)}
  .field-value{color:#ebebf5}
  .num-field{background:#2c2c2e}
  .tag{background:#2c2c2e;border-color:#48484a;color:#8e8e93}
  .prop-block{border-bottom-color:#38383a}
  .action-bar{background:linear-gradient(to top,rgba(0,0,0,.98),rgba(0,0,0,.9) 72%,rgba(0,0,0,0))}
  .add-btn{background:#1c1c1e;color:#0a84ff;border-color:#0a84ff}
  .gen-btn{background:#0a84ff}
  .back-btn,.copy-btn{color:#0a84ff;border-color:#0a84ff}
  .out-box{color:#f2f2f7}
  .loading-overlay{background:rgba(0,0,0,.36)}
  .loading-panel{background:rgba(28,28,30,.94);border-color:rgba(255,255,255,.08);color:#f2f2f7}
}
</style>
</head>
<body>
<div id="editorScreen" class="screen active">
  <div class="top-pane">
    <h1>日報作成</h1>
    <div class="top-grid">
      <div class="top-card wide">
        <div class="sec-title">基本情報</div>
        <div class="field">
          <label>担当者名</label>
          <input type="text" id="staff" value="工藤" inputmode="text">
        </div>
        <div class="field">
          <label>作成日</label>
          <input type="text" id="reportDate" readonly>
        </div>
      </div>

      <div class="top-card sales">
        <div class="sec-title">賃貸 — 売上・実績</div>
        <div class="field"><label>売上目標（円）</label><input type="number" id="target" placeholder="500000" inputmode="numeric"></div>
        <div class="field"><label>当月実績（円）</label><input type="number" id="actual" placeholder="85000" inputmode="numeric"></div>
        <div class="field"><label>当月見込み（円）</label><input type="number" id="forecast" placeholder="505455" inputmode="numeric"></div>
        <div class="field"><label>契約件数</label><input type="number" id="contracts" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>内AD件数</label><input type="number" id="ad" placeholder="0" inputmode="numeric"></div>
      </div>

      <div class="top-card visitor">
        <div class="sec-title">来店客数（当日）</div>
        <div class="field"><label>予約</label><input type="number" id="v1" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>飛込</label><input type="number" id="v2" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>再来店</label><input type="number" id="v3" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>その他</label><input type="number" id="v4" placeholder="0" inputmode="numeric"></div>
      </div>

      <div class="top-card register">
        <div class="sec-title">物件登録件数</div>
        <div class="field"><label>at home 目標</label><select id="ah1" class="target-select"><option value="10">10</option><option value="20">20</option><option value="30">30</option><option value="40" selected>40</option><option value="50">50</option></select></div>
        <div class="field"><label>at home 実績</label><input type="number" id="ah2" placeholder="39" inputmode="numeric"></div>
        <div class="field"><label>SUUMO 目標</label><select id="su1" class="target-select"><option value="10" selected>10</option><option value="20">20</option><option value="30">30</option><option value="40">40</option><option value="50">50</option></select></div>
        <div class="field"><label>SUUMO 実績</label><input type="number" id="su2" placeholder="10" inputmode="numeric"></div>
        <div class="field"><label>ホームページ</label><input type="number" id="hp" placeholder="44" inputmode="numeric"></div>
      </div>

      <div class="top-card vacancy">
        <div class="sec-title">賃貸空室</div>
        <div class="field"><label>管理物件</label><input type="number" id="r1" placeholder="6" inputmode="numeric"></div>
        <div class="field"><label>一般物件</label><input type="number" id="r2" placeholder="0" inputmode="numeric"></div>
        <div class="field"><label>内空き予定</label><input type="number" id="r3" placeholder="3" inputmode="numeric"></div>
        <div class="field"><label>内サブリース</label><input type="number" id="r4" placeholder="0" inputmode="numeric"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="sec-title">空き物件状況</div>
    <div id="propList"></div>
  </div>

  <div class="action-bar">
    <button type="button" class="add-btn" onclick="addPropAndFocus()">＋ 物件を追加</button>
    <button type="button" class="gen-btn" id="generateBtn" onclick="handleGenerate()">日報を生成する</button>
  </div>
</div>

<div id="reportScreen" class="screen">
  <div class="report-head">
    <button type="button" class="back-btn" onclick="goBackToEditor()"><span class="arrow">←</span>戻る</button>
  </div>
  <div class="out-wrap" id="outWrap">
    <div class="out-box" id="out"></div>
    <button type="button" class="copy-btn" id="copyBtn" onclick="copyOut()">コピーする</button>
  </div>
</div>

<div id="loadingOverlay" class="loading-overlay hidden" aria-live="polite" aria-busy="true">
  <div class="loading-panel">
    <span class="spin-arrow" aria-hidden="true">↻</span>
    <span>生成中...</span>
  </div>
</div>

<script>
let pid=0;
let isGenerating=false;
const statusLabels=['通常','賃料査定中','ネット掲載準備中'];
const storageKey='daily_report_last_values_v1';
const seedVersion='2026-04-21';
const fieldDefaults={
  staff:'工藤',
  target:'500000',
  actual:'518000',
  forecast:'580000',
  contracts:'2',
  ad:'0',
  v1:'0',
  v2:'1',
  v3:'0',
  v4:'0',
  ah1:'40',
  ah2:'32',
  su1:'10',
  su2:'8',
  hp:'35',
  r1:'8',
  r2:'0',
  r3:'3',
  r4:'0'
};
const persistedFieldIds=[
  'staff','target','actual','forecast','contracts','ad',
  'v1','v2','v3','v4',
  'ah1','ah2','su1','su2','hp',
  'r1','r2','r3','r4'
];
const initProps=[
  ['La Stage West 中野 401','通常',8,1],
  ['ファランドール 103','通常',5,1],
  ['BARN OWL 102','通常',4,1],
  ['ヒルズガレージ 105','賃料査定中',0,0],
  ['ヴィラーヌ高崎','通常',8,0],
  ['カーサロッソ 202','ネット掲載準備中',0,0],
  ['エンドレス大成Ⅰ 103','賃料査定中',0,0],
  ['カーサピッコラ 402','通常',1,0]
];

function getEl(id){return document.getElementById(id);}
function getVal(id,usePlaceholder){
  const el=getEl(id);
  if(!el)return '';
  if(el.value!=='')return el.value;
  if(usePlaceholder&&typeof el.placeholder==='string'&&el.placeholder!=='')return el.placeholder;
  return '';
}

function normalizeNumericText(value){
  const digits=String(value===undefined||value===null?'':value).replace(/[^0-9]/g,'');
  if(digits==='')return '';
  return digits.replace(/^0+(?=\d)/,'');
}

function isNumericLikeInput(input){
  if(!(input instanceof HTMLInputElement))return false;
  if(input.readOnly)return false;
  if(input.type==='number')return true;
  if(input.classList.contains('ios-num'))return true;
  return input.getAttribute('inputmode')==='numeric';
}

function sanitizeNumericInputField(input){
  if(!isNumericLikeInput(input))return;
  const before=input.value||'';
  const selStart=typeof input.selectionStart==='number'?input.selectionStart:before.length;
  const selEnd=typeof input.selectionEnd==='number'?input.selectionEnd:before.length;
  const leftRaw=before.slice(0,selStart);
  const normalized=normalizeNumericText(before);
  if(normalized===before)return;
  input.value=normalized;
  const leftNormalized=normalizeNumericText(leftRaw);
  const nextPos=Math.min(leftNormalized.length,normalized.length);
  try{
    if(document.activeElement===input){
      input.setSelectionRange(nextPos,nextPos);
      return;
    }
    const atEnd=selStart===before.length&&selEnd===before.length;
    if(atEnd)moveCaretToEnd(input);
  }catch(_e){}
}

function gv(id){
  const normalized=normalizeNumericText(getVal(id,true));
  return normalized===''?'0':normalized;
}
function yen(n){return parseInt(n||0,10).toLocaleString('ja-JP')+'円';}

function formatDateWithDow(d){
  const days=['日','月','火','水','木','金','土'];
  return `${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
}
function formatFullDateWithDow(d){
  const days=['日','月','火','水','木','金','土'];
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${days[d.getDay()]}）`;
}
function syncToday(){
  const el=getEl('reportDate');
  if(el)el.value=formatFullDateWithDow(new Date());
}

function forceIOSZoomOut(){
  const viewport=document.querySelector('meta[name="viewport"]');
  if(!viewport)return;
  const fallback='width=device-width, initial-scale=1.0, viewport-fit=cover';
  const original=viewport.getAttribute('content')||fallback;
  if(!viewport.dataset.defaultViewport)viewport.dataset.defaultViewport=original;
  viewport.setAttribute('content','width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover');
  setTimeout(()=>{
    viewport.setAttribute('content',viewport.dataset.defaultViewport||fallback);
  },140);
}

function isIOSDevice(){
  const ua=navigator.userAgent||'';
  const iOS=/iPad|iPhone|iPod/.test(ua);
  const iPadOS=navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1;
  return iOS||iPadOS;
}

function isStandalonePWA(){
  const byMedia=window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches;
  const byIOSFlag=window.navigator&&window.navigator.standalone===true;
  return !!(byMedia||byIOSFlag);
}

let lastHapticAt=0;
function triggerIOSHaptic(){
  const canVibrate=typeof navigator.vibrate==='function';
  if(!isIOSDevice()&&!isStandalonePWA()&&!canVibrate)return;
  const now=Date.now();
  if(now-lastHapticAt<80)return;
  lastHapticAt=now;

  try{
    if(window.Telegram&&window.Telegram.WebApp&&window.Telegram.WebApp.HapticFeedback){
      window.Telegram.WebApp.HapticFeedback.impactOccurred('light');
      return;
    }
  }catch(_e){}

  try{
    const handlers=window.webkit&&window.webkit.messageHandlers;
    if(handlers&&handlers.hapticFeedback){
      handlers.hapticFeedback.postMessage({style:'light'});
      return;
    }
    if(handlers&&handlers.haptic){
      handlers.haptic.postMessage('light');
      return;
    }
  }catch(_e){}

  try{
    if(canVibrate)navigator.vibrate([8]);
  }catch(_e){}
}

function setupIOSButtonHaptics(){
  const canVibrate=typeof navigator.vibrate==='function';
  if(!isIOSDevice()&&!isStandalonePWA()&&!canVibrate)return;
  document.addEventListener('touchstart',e=>{
    const target=e.target;
    if(!(target instanceof Element))return;
    const control=target.closest('button,.tag');
    if(!control)return;
    if(control instanceof HTMLButtonElement&&control.disabled)return;
    triggerIOSHaptic();
  },{passive:true});
  document.addEventListener('keydown',e=>{
    const target=e.target;
    if(!(target instanceof Element))return;
    if(e.key!=='Enter'&&e.key!==' ')return;
    const control=target.closest('button,.tag');
    if(!control)return;
    if(control instanceof HTMLButtonElement&&control.disabled)return;
    triggerIOSHaptic();
  });
}

function moveCaretToEnd(el){
  if(!el)return;
  try{
    const len=el.value.length;
    el.setSelectionRange(len,len);
  }catch(_e){}
}

function selectAllInputValue(el){
  if(!(el instanceof HTMLInputElement||el instanceof HTMLTextAreaElement))return;
  if(el.readOnly||el.disabled)return;
  if((el.value||'').length===0)return;
  try{
    if(typeof el.select==='function'){
      el.select();
      return;
    }
    const len=el.value.length;
    el.setSelectionRange(0,len);
  }catch(_e){}
}

function keepIOSCaretAtEndIfNeeded(input){
  if(!isIOSDevice())return;
  if(!(input instanceof HTMLInputElement))return;
  if(!input.classList.contains('ios-num'))return;
  if(document.activeElement!==input)return;
  try{
    const pos=typeof input.selectionStart==='number'?input.selectionStart:0;
    const end=typeof input.selectionEnd==='number'?input.selectionEnd:0;
    if(input.value.length>0&&pos===0&&end===0){
      setTimeout(()=>selectAllInputValue(input),0);
    }
  }catch(_e){}
}

function normalizeIOSNumericInputs(root){
  if(!isIOSDevice())return;
  const scope=root||document;
  scope.querySelectorAll('input[type=\"number\"]').forEach(input=>{
    input.setAttribute('type','text');
    input.setAttribute('inputmode','numeric');
    input.setAttribute('pattern','[0-9]*');
    input.classList.add('ios-num');
  });
}

function setupIOSNumericCaretFix(){
  if(!isIOSDevice())return;
  document.body.classList.add('ios');
  normalizeIOSNumericInputs(document);
  document.addEventListener('focusin',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement))return;
    if(!target.classList.contains('ios-num'))return;
    setTimeout(()=>selectAllInputValue(target),0);
  });
  document.addEventListener('input',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement))return;
    keepIOSCaretAtEndIfNeeded(target);
  });
  document.addEventListener('touchend',e=>{
    const target=e.target;
    if(!(target instanceof Element))return;
    const input=target.closest('input.ios-num');
    if(!(input instanceof HTMLInputElement))return;
    keepIOSCaretAtEndIfNeeded(input);
  },{passive:true});
  document.addEventListener('focusout',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement||target instanceof HTMLTextAreaElement))return;
    if(target.readOnly)return;
    if(target instanceof HTMLInputElement)sanitizeNumericInputField(target);
    setTimeout(forceIOSZoomOut,0);
  });
}

function setupFocusSelectForEditableInputs(){
  document.addEventListener('focusin',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement||target instanceof HTMLTextAreaElement))return;
    if(target.readOnly||target.disabled)return;
    if(target.classList.contains('ios-num'))return;
    setTimeout(()=>selectAllInputValue(target),0);
  });
}

function setupNumericInputSanitizer(){
  document.addEventListener('input',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement))return;
    sanitizeNumericInputField(target);
  });
  document.addEventListener('blur',e=>{
    const target=e.target;
    if(!(target instanceof HTMLInputElement))return;
    sanitizeNumericInputField(target);
  },true);
}

function addProp(name='',status='通常',h=0,s=0,focusAfterAdd=false){
  const id=pid++;
  const safeH=normalizeNumericText(h);
  const safeS=normalizeNumericText(s);
  const initialH=safeH===''?'0':safeH;
  const initialS=safeS===''?'0':safeS;
  const div=document.createElement('div');
  div.className='prop-block';
  div.id='pb'+id;
  const tagsHtml=statusLabels.map(label=>`<span class="tag${label===status?' on':''}" onclick="toggleTag(this,${id})">${label}</span>`).join('');
  div.innerHTML=`
<div class="del-row"><button class="del-btn" onclick="removeProp(${id})">削除</button></div>
<input class="prop-name" id="pn${id}" type="text" placeholder="物件名・部屋番号" value="${name}" inputmode="text">
<div class="tags" id="sr${id}">${tagsHtml}</div>
<div class="nums-row">
  <div class="num-field"><label>🈳 反響</label><input type="number" id="ph${id}" value="${initialH}" inputmode="numeric"></div>
  <div class="num-field"><label>🈸 反響</label><input type="number" id="ps${id}" value="${initialS}" inputmode="numeric"></div>
</div>`;
  getEl('propList').appendChild(div);
  normalizeIOSNumericInputs(div);
  if(focusAfterAdd){
    const nameInput=getEl('pn'+id);
    div.scrollIntoView({behavior:'smooth',block:'center'});
    setTimeout(()=>{
      if(!nameInput)return;
      nameInput.focus();
      nameInput.select();
    },220);
  }
}

function addPropAndFocus(){
  addProp('', '通常', 0, 0, true);
}

function removeProp(id){
  const target=getEl('pb'+id);
  if(!target||target.classList.contains('is-removing'))return;
  target.style.maxHeight=target.scrollHeight+'px';
  target.getBoundingClientRect();
  target.classList.add('is-removing');
  target.style.maxHeight='0px';

  let done=false;
  const finalize=()=>{
    if(done)return;
    done=true;
    target.remove();
  };
  target.addEventListener('transitionend',e=>{
    if(e.propertyName==='max-height')finalize();
  },{once:true});
  setTimeout(finalize,450);
}

function toggleTag(el,id){
  const wrap=getEl('sr'+id);
  if(!wrap)return;
  wrap.querySelectorAll('.tag').forEach(tag=>tag.classList.remove('on'));
  el.classList.add('on');
}

function getStatus(id){
  const wrap=getEl('sr'+id);
  const on=wrap?wrap.querySelector('.tag.on'):null;
  return on?on.textContent:'通常';
}

function loadLastSnapshot(){
  try{
    const raw=localStorage.getItem(storageKey);
    if(!raw)return null;
    const data=JSON.parse(raw);
    if(!data||typeof data!=='object')return null;
    if(data.seedVersion!==seedVersion)return null;
    return data;
  }catch(_e){
    return null;
  }
}

function applyInitialFieldValues(snapshot){
  persistedFieldIds.forEach(id=>{
    const el=getEl(id);
    if(!el)return;
    const hasSaved=snapshot&&snapshot.fields&&snapshot.fields[id]!==undefined&&snapshot.fields[id]!==null;
    const saved=hasSaved?String(snapshot.fields[id]):'';
    const hasDefault=fieldDefaults[id]!==undefined&&fieldDefaults[id]!==null;
    let initial=saved!==''?saved:(hasDefault?String(fieldDefaults[id]):'');
    if(id!=='staff'){
      const normalized=normalizeNumericText(initial);
      initial=normalized===''?'0':normalized;
    }
    el.value=initial;
  });
}

function getPropsSnapshot(){
  const props=[];
  getEl('propList').querySelectorAll('.prop-block').forEach(block=>{
    const i=block.id.replace('pb','');
    props.push({
      name:getVal('pn'+i,false),
      status:getStatus(i),
      h:gv('ph'+i),
      s:gv('ps'+i)
    });
  });
  return props;
}

function saveLastSnapshot(){
  try{
    const fields={};
    persistedFieldIds.forEach(id=>{
      if(id==='staff'){
        fields[id]=getVal(id,false)||fieldDefaults.staff;
        return;
      }
      fields[id]=gv(id);
    });
    const data={seedVersion,fields,props:getPropsSnapshot()};
    localStorage.setItem(storageKey,JSON.stringify(data));
  }catch(_e){}
}

function showReport(){
  getEl('editorScreen').classList.remove('active');
  getEl('reportScreen').classList.add('active');
  window.scrollTo(0,0);
}

function goBackToEditor(){
  getEl('reportScreen').classList.remove('active');
  getEl('editorScreen').classList.add('active');
  window.scrollTo(0,0);
}

function setGenerateLoading(isLoading){
  const btn=getEl('generateBtn');
  const overlay=getEl('loadingOverlay');
  if(!btn||!overlay)return;
  if(isLoading){
    btn.disabled=true;
    overlay.classList.remove('hidden');
    return;
  }
  btn.disabled=false;
  overlay.classList.add('hidden');
}

function handleGenerate(){
  if(isGenerating)return;
  isGenerating=true;
  setGenerateLoading(true);
  setTimeout(()=>{
    try{
      generate();
    }finally{
      setGenerateLoading(false);
      isGenerating=false;
    }
  },550);
}

function generate(){
  const d=new Date();
  const m=d.getMonth()+1;
  const reiwa=d.getFullYear()-2018;
  const dateLabel=formatDateWithDow(d);
  syncToday();
  const staff=getVal('staff',false)||'　';
  const lines=[];
  lines.push(`${dateLabel}   担当　${staff}`);
  lines.push('1️⃣賃貸　');
  lines.push(`令和${reiwa}年${m}月目標`);
  lines.push(`売上目標 ${yen(gv('target'))}`);
  lines.push(`当月実績 ${yen(gv('actual'))}`);
  lines.push(`当月見込み ${yen(gv('forecast'))}`);
  lines.push(`契約件数　　　　${gv('contracts')}件`);
  lines.push(`(内AD                  ${gv('ad')}件)`);
  lines.push('');
  lines.push('◉来店客数');
  lines.push('当日');
  lines.push(`予約　　　${gv('v1')}件`);
  lines.push(`飛込　　　${gv('v2')}件`);
  lines.push(`再来店　　${gv('v3')}件`);
  lines.push(`その他　　${gv('v4')}件`);
  lines.push('');
  lines.push('◉物件登録件数');
  lines.push(`at home ${gv('ah1')}件     ${gv('ah2')}件`);
  lines.push(`SUUMO  ${gv('su1')}件     ${gv('su2')}件`);
  lines.push(`ホームページ        ${gv('hp')}件`);
  lines.push('');
  lines.push('◉賃貸空室');
  lines.push(`管理物件　　　　${gv('r1')}件`);
  lines.push(`一般物件　　　　${gv('r2')}件`);
  lines.push(`内空き予定　　　${gv('r3')}件`);
  lines.push(`内サブリース　　${gv('r4')}件`);
  lines.push('');
  lines.push('【空き物件状況】');
  lines.push('　反響月累計');

  let idx=1;
  getEl('propList').querySelectorAll('.prop-block').forEach(block=>{
    const i=block.id.replace('pb','');
    const name=getVal('pn'+i,false).trim();
    if(!name)return;
    const st=getStatus(i);
    const suffix=st!=='通常'?`（${st}）`:'';
    lines.push(`${idx}.${name}${suffix}`);
    lines.push(`　🈳反響 ${gv('ph'+i)}    🈸${gv('ps'+i)}`);
    idx++;
  });

  getEl('out').textContent=lines.join('\n');
  const btn=getEl('copyBtn');
  btn.textContent='コピーする';
  btn.className='copy-btn';
  saveLastSnapshot();
  showReport();
}

function copyOut(){
  const text=getEl('out').textContent;
  const btn=getEl('copyBtn');
  if(!text)return;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showOk(btn)).catch(()=>fallbackCopy(text,btn));
  }else{
    fallbackCopy(text,btn);
  }
}

function fallbackCopy(text,btn){
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;left:-9999px;top:0;font-size:16px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try{document.execCommand('copy');showOk(btn);}catch(_e){}
  document.body.removeChild(ta);
}

function showOk(btn){
  btn.textContent='コピーしました！';
  btn.className='copy-btn ok';
  setTimeout(()=>{
    btn.textContent='コピーする';
    btn.className='copy-btn';
  },2500);
}

const lastSnapshot=loadLastSnapshot();
applyInitialFieldValues(lastSnapshot);
setupIOSNumericCaretFix();
setupFocusSelectForEditableInputs();
setupNumericInputSanitizer();
setupIOSButtonHaptics();
if(lastSnapshot&&Array.isArray(lastSnapshot.props)&&lastSnapshot.props.length){
  lastSnapshot.props.forEach(p=>{
    const name=typeof p.name==='string'?p.name:'';
    const status=statusLabels.includes(p.status)?p.status:'通常';
    const hRaw=String(p&&p.h!==undefined&&p.h!==null?p.h:'0');
    const sRaw=String(p&&p.s!==undefined&&p.s!==null?p.s:'0');
    const h=normalizeNumericText(hRaw);
    const s=normalizeNumericText(sRaw);
    addProp(name,status,h===''?'0':h,s===''?'0':s);
  });
}else{
  initProps.forEach(p=>addProp(p[0],p[1],p[2],p[3]));
}
syncToday();
</script>
